name: Build and Push Dist

on:
  push:
    branches:
      - main # Change this if your default branch is different

permissions:
  contents: write # Needed for git-auto-commit-action to push changes

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # Use the version you're on, usually v9 or v8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Project
        run: pnpm run build

      - name: Commit and Push dist folder
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-build dist [skip ci]"
          file_pattern: 'dist/*'
          add_options: '-f' # Forces adding ignored files
          branch: main # Push back to the main branch
